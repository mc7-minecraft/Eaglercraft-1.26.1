					window.eaglercraftXOpts = {

						localesURI: "lang/",
						worldsDB: "worlds/",
						servers: [
							{ addr: "wss://", name: "Server not found! Error Code 134: Server Error" },
              { addr: "wss://learnmaths.ir", name: "AdderallMC" },
							{ addr: "wss://arch.mc", name: "ArchMC" },
							{ addr: "wss://play.craftclue.rocks", name: "CraftClue"}

						]
					};
					main();
				}
